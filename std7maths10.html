<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maths Quiz Pro | std7maths10</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* અહી મેં તમારી જૂની ગ્લાસ થીમ અને નવી સર્ટિફિકેટ ડિઝાઇન બંને મિક્સ કરી છે */
    :root { --primary: #6366f1; --accent: #f43f5e; --glass: rgba(255, 255, 255, 0.95); }
    body { font-family: 'Hind Vadodara', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #1f2937; }
    .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 30px; padding: 2rem; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
    .btn { background: linear-gradient(to bottom, #6366f1, #4f46e5); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-size: 1.2rem; font-weight: 700; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 0 #3730a3; transition: 0.1s; font-family: inherit; }
    .btn:active { transform: translateY(5px); box-shadow: 0 0 0 #3730a3; }
    .btn-gold { background: linear-gradient(to bottom, #f59e0b, #d97706); box-shadow: 0 5px 0 #b45309; }
    .option-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: #3b82f6; border: none; border-radius: 12px; color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; text-align: left; font-family: inherit; }
    .correct { background: #22c55e !important; }
    .wrong { background: #ef4444 !important; }
    .hidden { display: none !important; }
    .lb-item { display: flex; justify-content: space-between; padding: 10px; background: white; border-radius: 10px; margin-bottom: 5px; border: 1px solid #eee; }
    #cert-canvas { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div id="screen-start">
    <h1>📐 ગણિત માસ્ટર</h1>
    <p>ધોરણ 7 | પ્રકરણ 10: બીજગણિતીય પદાવલિ</p>
    <input type="text" id="username" placeholder="તમારું આખું નામ લખો..." style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin:15px 0; text-align:center; font-size:1.1rem;">
    <button class="btn" onclick="startGame()">ક્વિઝ શરૂ કરો 🚀</button>
  </div>

  <div id="screen-quiz" class="hidden">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:700;">
        <span>પ્રશ્ન: <span id="q-idx">1</span>/10</span>
        <span>⏳ <span id="timer">45</span>s</span>
    </div>
    <div id="q-text" style="background:#f9fafb; padding:20px; border-radius:15px; font-weight:700; margin-bottom:15px;"></div>
    <div id="options-box"></div>
  </div>

  <div id="screen-result" class="hidden">
    <h2>પરિણામ 🎉</h2>
    <div style="font-size:3.5rem; font-weight:900; color:var(--primary);" id="final-score">0/10</div>
    <p id="time-stats"></p>
    
    <button id="btn-cert" class="btn btn-gold hidden" onclick="downloadCertificate()">📜 સર્ટિફિકેટ ડાઉનલોડ કરો</button>
    
    <div id="save-msg" style="margin:15px 0; font-weight:bold; color:var(--primary);">સ્કોર સેવ થાય છે... ⏳</div>

    <h3 style="text-align:left; border-bottom:2px solid #6366f1;">🏆 લીડરબોર્ડ</h3>
    <div id="lb-list" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>

    <button class="btn" onclick="location.reload()">ફરીથી રમો 🔄</button>
  </div>
</div>

<canvas id="cert-canvas" width="800" height="600"></canvas>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4PIw3O5eWNFrDoul20G0X3PVzeQKpKpmxo_ZZUO5-Irx4-SeOI8L1XKm79KzhP1C7/execો";
  const TAB_NAME = "std7maths10"; // શીટમાં ટેબનું નામ
  const SUBJECT = "ગણિત (ધોરણ-7)";
  const CHAPTER = "પ્રકરણ-10: બીજગણિતીય પદાવલિ";

  let questions = [], currentQ = 0, score = 0, timer, timeLeft = 45, totalTimeTaken = 0, userName = "", myRank = 0;

  async function startGame() {
    userName = document.getElementById('username').value.trim();
    if(!userName) return alert("નામ લખો!");
    
    document.getElementById('screen-start').classList.add('hidden');
    const res = await fetch(`${SCRIPT_URL}?action=getQuizData&tabName=${TAB_NAME}`);
    questions = await res.json();
    
    document.getElementById('screen-quiz').classList.remove('hidden');
    loadQuestion();
  }

  function loadQuestion() {
    clearInterval(timer); timeLeft = 45;
    document.getElementById('q-idx').innerText = currentQ + 1;
    document.getElementById('timer').innerText = timeLeft;
    
    const q = questions[currentQ];
    document.getElementById('q-text').innerText = q.q;
    const box = document.getElementById('options-box'); box.innerHTML = "";
    
    q.opt.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn'; btn.innerText = o;
      btn.onclick = () => checkAns(i, btn);
      box.appendChild(btn);
    });

    timer = setInterval(() => {
      timeLeft--; document.getElementById('timer').innerText = timeLeft;
      if(timeLeft <= 0) { clearInterval(timer); totalTimeTaken += 45; nextQ(); }
    }, 1000);
  }

  function checkAns(idx, btn) {
    clearInterval(timer); totalTimeTaken += (45 - timeLeft);
    const correct = questions[currentQ].ans;
    const all = document.querySelectorAll('.option-btn');
    all.forEach(b => b.disabled = true);

    if(idx === correct) { score++; btn.classList.add('correct'); }
    else { btn.classList.add('wrong'); all[correct].classList.add('correct'); }
    setTimeout(nextQ, 1500);
  }

  function nextQ() {
    currentQ++;
    if(currentQ < 10) loadQuestion();
    else endGame();
  }

  async function endGame() {
    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    document.getElementById('final-score').innerText = score + "/10";
    document.getElementById('time-stats').innerText = `સમય: ${totalTimeTaken} સેકન્ડ`;

    // ડેટા સેવ કરો
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ name: userName, score: score, time: totalTimeTaken, tabName: TAB_NAME })
    });
    const data = await res.json();
    showLeaderboard(data);
  }

  function showLeaderboard(data) {
    document.getElementById('save-msg').innerText = "✔ સેવ થઈ ગયું!";
    const list = document.getElementById('lb-list'); list.innerHTML = "";
    
    data.leaderboard.forEach((r, i) => {
      if(r.name === userName && r.score == score) myRank = i + 1;
      list.innerHTML += `<div class="lb-item"><span>#${i+1} ${r.name}</span><b>${r.score}</b></div>`;
    });

    // જો ૭૦% થી વધુ માર્કસ હોય તો સર્ટિફિકેટ બતાવવું
    if(score >= 7) document.getElementById('btn-cert').classList.remove('hidden');
  }

  // --- સર્ટિફિકેટ જનરેશન ---
  function downloadCertificate() {
    const canvas = document.getElementById('cert-canvas');
    const ctx = canvas.getContext('2d');
    
    // Background
    ctx.fillStyle = "#fffdf5"; ctx.fillRect(0, 0, 800, 600);
    ctx.lineWidth = 15; ctx.strokeStyle = "#1a237e"; ctx.strokeRect(10, 10, 780, 580);
    ctx.lineWidth = 5; ctx.strokeStyle = "#d4af37"; ctx.strokeRect(25, 25, 750, 550);

    ctx.textAlign = "center"; ctx.fillStyle = "#1a237e";
    ctx.font = "bold 30px Arial"; ctx.fillText("ઇકબાલગઢ પગાર કેન્દ્ર શાળા પીએમ શ્રી ગુજરાત", 400, 100);
    
    ctx.font = "bold 45px Arial"; ctx.fillStyle = "#b45309"; ctx.fillText("🏆 સિદ્ધિ પ્રમાણપત્ર 🏆", 400, 180);
    
    ctx.font = "22px Arial"; ctx.fillStyle = "#4b5563"; ctx.fillText("આથી પ્રમાણપત્ર આપવામાં આવે છે કે,", 400, 240);
    
    ctx.font = "bold 38px Arial"; ctx.fillStyle = "#111827"; ctx.fillText(userName, 400, 310);
    
    ctx.font = "24px Arial"; ctx.fillStyle = "#374151";
    ctx.fillText(`વિષય: ${SUBJECT}`, 400, 370);
    ctx.fillText(`${CHAPTER}`, 400, 410);
    ctx.fillText(`તેમણે આ કસોટીમાં ${score}/10 ગુણ સાથે ${myRank} મો નંબર મેળવ્યો છે.`, 400, 460);

    ctx.font = "italic 25px Arial"; ctx.fillText("Nayan Prajapati (Science Teacher)", 600, 540);

    const link = document.createElement('a');
    link.download = `Certificate_${userName}.png`;
    link.href = canvas.toDataURL();
    link.click();
  }
</script>
</body>
</html>
