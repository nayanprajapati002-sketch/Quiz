<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>પરિમિતિ ચેમ્પિયન</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;700&display=swap');

        body {
            font-family: 'Hind Vadodara', sans-serif;
            background-color: #E0F7FA;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* --- SCREEN STYLES --- */
        .screen {
            display: none; /* Hidden by default */
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .active {
            display: flex; /* Only active screen is shown */
        }

        /* --- START SCREEN --- */
        .start-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 400px;
            border: 5px solid #00ACC1;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
            font-family: 'Hind Vadodara', sans-serif;
        }

        .btn-primary {
            background-color: #00BCD4;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            box-shadow: 0 4px #0097A7;
        }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 1px #0097A7; }

        /* --- GAME SCREEN --- */
        .header-info {
            width: 100%;
            background: #006064;
            color: white;
            padding: 10px 0;
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: absolute;
            top: 0;
            z-index: 100;
        }

        .score-board {
            background: #FFD740;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 60px; /* Space for header */
            font-size: 18px;
            display: inline-block;
        }

        .game-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 300px; 
            background: #B3E5FC; 
            border-radius: 20px;
            border: 4px solid #0288D1;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        .ground-strip {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: #7CB342;
            border-top: 5px solid #558B2F;
            z-index: 0;
        }

        #svgContainer { z-index: 1; transform: translateY(-20px); }

        #goat {
            width: 70px; height: 70px; font-size: 50px;
            position: absolute; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            bottom: 15px; left: 10px;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 10px;
        }

        .option-btn {
            background: white;
            border: 3px solid #FF8A65;
            border-radius: 15px;
            height: 60px;
            font-size: 20px;
            font-weight: bold;
            color: #D84315;
            box-shadow: 0 4px #BF360C;
        }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0; }
        .option-btn.correct { background: #66BB6A; color: white; border-color: #2E7D32; }
        .option-btn.wrong { background: #EF5350; color: white; }

        /* --- WIN SCREEN --- */
        .win-box {
            background: #FFF9C4;
            padding: 40px;
            border-radius: 20px;
            border: 5px solid #FBC02D;
            max-width: 450px;
            animation: popUp 0.5s;
        }
        @keyframes popUp { from {transform: scale(0);} to {transform: scale(1);} }

        .trophy { font-size: 80px; margin-bottom: 20px; }
        .win-title { color: #E65100; font-size: 30px; margin: 0; }
        .win-text { font-size: 20px; color: #555; margin: 15px 0; }
        
        svg text.label { font-size: 16px; font-weight: bold; fill: #3E2723; }
        svg text.grass { font-size: 40px; }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            background-color: red;
            animation: fall 3s linear forwards;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

    </style>
</head>
<body>

    <div id="startScreen" class="screen active">
        <div class="start-box">
            <div style="font-size: 60px;">🏫</div>
            <h1 style="color: #0097A7; margin: 0;">સ્વાગત છે!</h1>
            <p>રમત શરૂ કરવા વિગતો ભરો</p>
            <input type="text" id="schoolName" placeholder="શાળાનું નામ લખો">
            <input type="text" id="studentName" placeholder="તમારું નામ લખો">
            <button class="btn-primary" onclick="startGame()">રમત શરૂ કરો ▶</button>
            <p style="font-size: 12px; color: red;" id="errorMsg"></p>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="header-info">
            <span id="displaySchool"></span> | <span id="displayStudent"></span>
        </div>

        <div class="score-board">પોઈન્ટ્સ: <span id="score">0</span> / 250</div>
        
        <div class="game-container">
            <div id="svgContainer"></div>
            <div id="goat">🐐</div>
            <div class="ground-strip"></div>
            <div id="msg" style="position: absolute; top: 10px; font-weight: bold; font-size: 20px; color: #E65100;"></div>
        </div>

        <div class="options-grid" id="optionsBox"></div>
        <p style="color: #555; font-size: 14px;">250 પોઈન્ટ્સ મેળવો અને જીતો!</p>
    </div>

    <div id="winScreen" class="screen">
        <div class="win-box">
            <div class="trophy">🏆</div>
            <h1 class="win-title">અભિનંદન!</h1>
            <h2 id="winnerName" style="color: #00796B;"></h2>
            <p class="win-text">તમે 250 પોઈન્ટ્સ મેળવીને વિજેતા બન્યા છો!</p>
            <p id="winnerSchool" style="font-weight: bold; color: #555;"></p>
            <button class="btn-primary" onclick="location.reload()">ફરી રમો ↺</button>
        </div>
    </div>

<script>
    let currentPerimeter = 0;
    let score = 0;
    let currentUnit = 'cm';
    let isProcessing = false;

    // --- Start Game Logic ---
    function startGame() {
        const school = document.getElementById('schoolName').value.trim();
        const student = document.getElementById('studentName').value.trim();
        const error = document.getElementById('errorMsg');

        if(school === "" || student === "") {
            error.innerText = "કૃપા કરીને બંને નામ લખો.";
            return;
        }

        // Set Names
        document.getElementById('displaySchool').innerText = school;
        document.getElementById('displayStudent').innerText = student;
        document.getElementById('winnerName').innerText = student;
        document.getElementById('winnerSchool').innerText = school;

        // Switch Screen
        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('gameScreen').classList.add('active');
        
        // Start Level
        generateLevel();
    }

    function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function generateLevel() {
        isProcessing = false;
        currentUnit = Math.random() < 0.5 ? 'cm' : 'm';
        let isBigLevel = Math.random() < 0.5;

        const types = ['square', 'rect', 'triangle'];
        const type = types[Math.floor(Math.random() * types.length)];
        const svgBox = document.getElementById('svgContainer');
        const goat = document.getElementById('goat');
        const msg = document.getElementById('msg');

        // Reset
        goat.style.bottom = "15px";
        goat.style.left = "10px";
        goat.style.transform = "scaleX(-1) scale(1)";
        goat.innerText = "🐐";
        msg.innerText = "";

        let svg = '';
        const shapeColor = "#FFCCBC"; 
        const strokeColor = "#E64A19";

        // Logic for sizes
        if (type === 'square') {
            let s = isBigLevel ? r(11, 49) : r(2, 9);
            currentPerimeter = s * 4;
            svg = `<svg width="200" height="200" viewBox="0 0 200 200">
                <rect x="50" y="50" width="100" height="100" fill="${shapeColor}" stroke="${strokeColor}" stroke-width="3"/>
                <text x="100" y="115" text-anchor="middle" class="grass">🌿</text>
                <text x="100" y="40" text-anchor="middle" class="label">${s} ${currentUnit}</text>
                <text x="165" y="105" class="label">${s} ${currentUnit}</text>
                <text x="100" y="170" text-anchor="middle" class="label">${s} ${currentUnit}</text>
                <text x="5" y="105" class="label">${s} ${currentUnit}</text>
            </svg>`;
        } 
        else if (type === 'rect') {
            let w = isBigLevel ? r(15, 45) : r(6, 9);
            let h = isBigLevel ? r(11, 30) : r(2, 5);
            currentPerimeter = (w + h) * 2;
            svg = `<svg width="240" height="160" viewBox="0 0 240 160">
                <rect x="30" y="40" width="180" height="80" fill="${shapeColor}" stroke="${strokeColor}" stroke-width="3"/>
                <text x="120" y="95" text-anchor="middle" class="grass">🌿</text>
                <text x="120" y="30" text-anchor="middle" class="label">${w} ${currentUnit}</text>
                <text x="120" y="145" text-anchor="middle" class="label">${w} ${currentUnit}</text>
                <text x="5" y="90" class="label">${h} ${currentUnit}</text>
                <text x="215" y="90" class="label">${h} ${currentUnit}</text>
            </svg>`;
        } 
        else {
            let a = isBigLevel ? r(12, 40) : r(3, 8);
            let b = isBigLevel ? r(12, 40) : r(3, 8);
            let c = isBigLevel ? r(12, 40) : r(3, 8);
            currentPerimeter = a + b + c;
            svg = `<svg width="200" height="200" viewBox="0 0 200 200">
                <polygon points="100,20 30,170 170,170" fill="${shapeColor}" stroke="${strokeColor}" stroke-width="3"/>
                <text x="100" y="120" text-anchor="middle" class="grass">🌿</text>
                <text x="50" y="80" class="label">${a} ${currentUnit}</text>
                <text x="130" y="80" class="label">${b} ${currentUnit}</text>
                <text x="100" y="190" text-anchor="middle" class="label">${c} ${currentUnit}</text>
            </svg>`;
        }
        svgBox.innerHTML = svg;
        generateOptions();
    }

    function generateOptions() {
        const container = document.getElementById('optionsBox');
        container.innerHTML = '';
        let answers = new Set([currentPerimeter]);
        let deviation = currentPerimeter > 50 ? 15 : 5; 

        while(answers.size < 4) {
            let wrong = currentPerimeter + r(-deviation, deviation);
            if(wrong > 0 && wrong !== currentPerimeter) answers.add(wrong);
        }
        
        Array.from(answers).sort(() => Math.random() - 0.5).forEach(val => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = val + " " + currentUnit;
            btn.onclick = () => checkAnswer(val, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(val, btnElement) {
        if(isProcessing) return;

        if (val === currentPerimeter) {
            isProcessing = true;
            btnElement.classList.add('correct');
            document.getElementById('msg').innerText = "યમ્મી! 🌿😋";
            
            // Score Update (10 Points)
            score += 10;
            document.getElementById('score').innerText = score;

            // Check Win Condition
            if (score >= 250) {
                celebrateWin();
                return;
            }

            // Normal Animation
            const goat = document.getElementById('goat');
            goat.style.bottom = "150px"; 
            goat.style.left = "calc(50% - 65px)"; 
            goat.style.transform = "scaleX(-1) scale(1.3)"; 

            setTimeout(() => {
                goat.innerText = "🌿😋"; 
                setTimeout(generateLevel, 1500);
            }, 1000);

        } else {
            btnElement.classList.add('wrong');
            const goat = document.getElementById('goat');
            goat.innerText = "😕"; 
            goat.style.transform = "scaleX(-1) translateX(-10px)";
            setTimeout(() => goat.style.transform = "scaleX(-1) translateX(10px)", 100);
            setTimeout(() => goat.style.transform = "scaleX(-1) translateX(0)", 200);

            setTimeout(() => {
                 btnElement.classList.remove('wrong');
                 goat.innerText = "🐐";
            }, 800);
        }
    }

    function celebrateWin() {
        setTimeout(() => {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('winScreen').classList.add('active');
            fireConfetti();
        }, 1000);
    }

    function fireConfetti() {
        for(let i=0; i<50; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = ['#ff0', '#f00', '#0f0', '#00f'][Math.floor(Math.random()*4)];
            conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(conf);
        }
    }
</script>

</body>
</html>
