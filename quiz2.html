<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Quiz | ઇકબાલગઢ શાળા</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Hind Vadodara', sans-serif;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #4b1248, #f0c27b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ઉપરનું હેડર અને બેક બટન */
        .header-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Hind Vadodara', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: translateX(-5px);
        }

        .title {
            margin: 0; 
            font-size: 1.8rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* ક્વિઝ બતાવવા માટેની ફ્રેમની ડિઝાઇન */
        .iframe-container {
            width: 95%;
            max-width: 900px;
            background: white; /* અંદરનો ભાગ સફેદ રાખ્યો છે જેથી તમારો જૂનો ઇન્ડેક્સ કોડ બરાબર દેખાય */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            overflow: hidden;
            margin-bottom: 30px;
            height: 75vh; /* સ્ક્રીનનો 75% ભાગ લેશે */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* મોબાઈલ વ્યુ માટે */
        @media (max-width: 600px) {
            .header-container {
                flex-direction: column-reverse;
                gap: 15px;
            }
            .iframe-container {
                height: 80vh;
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="index.html" class="back-btn">🔙 પાછા જાઓ</a>
        <h2 class="title">🧪 વિજ્ઞાન કસોટી </h2>
    </div>

    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbwZSKEakuYnCBJWMlxbTlqMMOL03HEUH3ufq6_EviErMrLY2kTueZt5CAdENXaLjZsY/exec" allowfullscreen></iframe>
    </div>

</body>
</html>
