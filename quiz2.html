<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4338ca;
      --accent: #f472b6;
      --glass: rgba(255, 255, 255, 0.90);
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --text-main: #1f2937;
    }

    body {
      font-family: 'Hind Vadodara', sans-serif;
      background: var(--bg-gradient);
      margin: 0; min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      color: var(--text-main);
      overflow: hidden;
      user-select: none;
    }

    .app-container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10;}

    /* Glassmorphism Card Style */
    .card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 2rem;
      width: 85%; max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.5);
      max-height: 90vh; overflow-y: auto;
      transition: transform 0.3s ease;
    }

    h1 { 
      background: -webkit-linear-gradient(45deg, #4f46e5, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800; font-size: 2rem; margin-bottom: 5px; 
    }
    
    h2, h3 { color: #374151; margin: 10px 0; }
    p { color: #6b7280; font-weight: 500; }

    /* Inputs & Buttons */
    input {
      width: 100%; padding: 15px; border: 2px solid #e0e7ff; border-radius: 15px;
      font-size: 1.1rem; text-align: center; outline: none; margin-top: 20px;
      font-family: 'Hind Vadodara', sans-serif; font-weight: 600;
      box-sizing: border-box; transition: 0.3s; background: rgba(255,255,255,0.8);
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }

    .btn {
      background: linear-gradient(90deg, var(--primary), #8b5cf6);
      color: white; border: none; padding: 16px; width: 100%;
      border-radius: 15px; font-size: 1.2rem; font-weight: 700;
      cursor: pointer; margin-top: 15px;
      box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
      transition: transform 0.1s; font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    
    .btn-secondary {
      background: white; color: var(--primary-dark);
      border: 2px solid #e0e7ff; padding: 12px; width: 100%;
      border-radius: 15px; font-weight: 700; margin-top: 10px; cursor: pointer;
      font-family: inherit;
    }

    /* Quiz Elements */
    .timer-badge {
      background: #fee2e2; color: #ef4444; padding: 5px 12px;
      border-radius: 20px; font-weight: bold; font-size: 1rem;
    }
    
    .question-box {
      background: linear-gradient(to right, #f3f4f6, #f9fafb);
      padding: 20px; border-radius: 16px; margin: 20px 0;
      font-size: 1.15rem; font-weight: 600; color: #1f2937;
      border-left: 5px solid var(--primary);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .option-btn {
      width: 100%; padding: 14px 18px; margin-bottom: 10px;
      background: white; border: 2px solid #f3f4f6; border-radius: 14px;
      font-size: 1rem; font-weight: 600; color: #4b5563; text-align: left;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
      position: relative;
    }
    .option-btn:active { background: #f9fafb; }
    
    .correct { background: #ecfdf5 !important; border-color: #10b981 !important; color: #065f46 !important; }
    .wrong { background: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

    /* Leaderboard Styles */
    .lb-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-bottom: 1px solid #f3f4f6;
      transition: background 0.2s;
    }
    .lb-item:first-child { background: linear-gradient(to right, #fffbeb, #fff); border-radius: 10px; border: 1px solid #fcd34d; }
    .lb-rank { font-weight: 900; width: 35px; font-size: 1.2rem; }
    .lb-name { flex-grow: 1; text-align: left; font-weight: 600; color: #374151; }
    .lb-details { text-align: right; font-size: 0.9rem; }
    .score-pill { background: var(--primary); color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.85rem; }
    .time-pill { color: #6b7280; font-size: 0.75rem; display: block; margin-top: 2px; }

    .live-badge {
      background: #111827; color: white; padding: 6px 16px;
      border-radius: 30px; font-size: 0.85rem; display: inline-flex;
      align-items: center; gap: 6px; margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 5px #22c55e; }

    /* Utilities */
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  </style>
</head>
<body>

<canvas id="confetti" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;"></canvas>

<div class="app-container">
  <div class="card">
    
    <div id="view-loading">
      <div class="spinner" style="margin-bottom:15px;"></div>
      <h3>તૈયાર થઈ રહ્યું છે...</h3>
    </div>

    <div id="view-start" class="hidden fade-in">
      <h1>🚀 સાયન્સ માસ્ટર</h1> <p>વિષય: વિદ્યુતપ્રવાહની અસરો</p>
      
      <div style="background: #eff6ff; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px dashed #6366f1;">
        <small style="color:var(--primary); font-weight:bold;">🏆 નિયમ: જેનો સ્કોર વધુ અને સમય ઓછો, તે જીતશે!</small>
      </div>

      <input type="text" id="username" placeholder="તમારું નામ લખો..." autocomplete="off">
      
      <button class="btn" onclick="startGame()">ક્વિઝ રમો ▶</button>
      <button class="btn-secondary" onclick="showLeaderboardOnly()">🏅 લિડરબોર્ડ જુઓ</button>
      <button class="btn-secondary" onclick="window.location.href='index.html'" style="border-color: #f472b6; color: #ec4899;">🏠 હોમ પેજ</button>
    </div>

    <div id="view-quiz" class="hidden fade-in">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span style="font-weight:bold; color:#6b7280;">પ્રશ્ન <span id="q-current" style="color:var(--primary); font-size:1.2rem;">1</span>/10</span>
        <div class="timer-badge">⏳ <span id="timer-display">30</span>s</div>
      </div>
      
      <div class="question-box" id="question-text">પ્રશ્ન લોડ થાય છે...</div>
      <div id="options-container"></div>
    </div>

    <div id="view-result" class="hidden fade-in">
      
      <div id="personal-result">
        <h2>તમારું પરિણામ 🎉</h2>
        <div style="font-size:4rem; font-weight:900; line-height:1; background: -webkit-linear-gradient(45deg, #4f46e5, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" id="final-score">0</div>
        <p style="margin-top:0;">કુલ સમય: <span id="final-time" style="color:var(--text-main); font-weight:bold;">0</span> સેકન્ડ</p>
        <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
      </div>

      <div>
        <div class="live-badge">
          <div class="live-dot"></div>
          કુલ સ્પર્ધકો: <span id="total-participants" style="font-weight:bold;">0</span>
        </div>

        <h3 style="text-align:left; margin-bottom:10px;">🏆 ટોપ-5 ચેમ્પિયન</h3>
        <div id="leaderboard-list" style="min-height: 100px;">
          <div class="spinner"></div> 
        </div>
      </div>

      <button class="btn" onclick="resetGame()" style="background:#1f2937; margin-top:20px;">ફરી રમો</button>
      <button class="btn-secondary" onclick="window.location.href='index.html'">🏠 હોમ પેજ</button>
    </div>

  </div>
</div>

<script>
  // તમારી લિંક અહીં મુકેલી છે
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZSKEakuYnCBJWMlxbTlqMMOL03HEUH3ufq6_EviErMrLY2kTueZt5CAdENXaLjZsY/exec";

  // --- SOUND EFFECTS ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'tick') {
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'success') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'error') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  // --- GAME LOGIC ---
  let allQuestions = [], currentQuestions = [];
  let currentQIndex = 0, score = 0, totalTimeTaken = 0;
  let timerInterval, timeLeft = 30;
  let userName = "";

  window.onload = async function() {
    try {
      const response = await fetch(`${SCRIPT_URL}?action=getQuizData`);
      const data = await response.json();
      initGame(data);
    } catch (error) {
      alert("ડેટા લોડ કરવામાં ભૂલ આવી છે. કૃપા કરીને રિફ્રેશ કરો.");
    }
  };

  function initGame(data) {
    allQuestions = data;
    switchView('view-start');
  }

  function switchView(viewId) {
    ['view-loading', 'view-start', 'view-quiz', 'view-result'].forEach(id => {
      document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(viewId).classList.remove('hidden');
  }

  function showLeaderboardOnly() {
    document.getElementById('personal-result').style.display = 'none';
    switchView('view-result');
    fetchLeaderboard();
  }

  function startGame() {
    const input = document.getElementById('username');
    if (!input.value.trim()) { 
      input.style.borderColor = "red"; 
      setTimeout(()=>input.style.borderColor="#e0e7ff", 1000);
      return; 
    }
    
    if (audioCtx.state === 'suspended') audioCtx.resume();

    userName = input.value.trim();
    if(allQuestions.length === 0) { alert("પ્રશ્નો મળ્યા નથી!"); return; }

    currentQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 10);
    currentQIndex = 0; score = 0; totalTimeTaken = 0;
    
    document.getElementById('personal-result').style.display = 'block';
    switchView('view-quiz');
    loadQuestion();
  }

  function loadQuestion() {
    clearInterval(timerInterval);
    timeLeft = 30;
    updateTimer();
    
    const q = currentQuestions[currentQIndex];
    document.getElementById('q-current').innerText = currentQIndex + 1;
    document.getElementById('question-text').innerText = q.q;
    
    const container = document.getElementById('options-container');
    container.innerHTML = "";
    
    q.opt.forEach((optText, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = optText;
      btn.onclick = () => handleAnswer(idx, btn);
      container.appendChild(btn);
    });

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if(timeLeft <= 5 && timeLeft > 0) playSound('tick'); 

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        playSound('error');
        handleAnswer(-1, null);
      }
    }, 1000);
  }

  function updateTimer() {
    document.getElementById('timer-display').innerText = timeLeft;
    const badge = document.querySelector('.timer-badge');
    if(timeLeft <= 5) badge.style.background = "#fee2e2"; 
    else badge.style.background = "#e0e7ff";
  }

  function handleAnswer(selectedIndex, btnElement) {
    clearInterval(timerInterval);
    let timeSpent = 30 - timeLeft;
    totalTimeTaken += timeSpent;

    const correctIndex = currentQuestions[currentQIndex].ans;
    const allBtns = document.querySelectorAll('.option-btn');
    allBtns.forEach(b => b.disabled = true);

    if (btnElement) {
       if (selectedIndex === correctIndex) {
         score++;
         btnElement.classList.add('correct');
         playSound('success');
       } else {
         btnElement.classList.add('wrong');
         allBtns[correctIndex].classList.add('correct');
         playSound('error');
       }
    } else {
       allBtns[correctIndex].classList.add('correct'); 
    }

    setTimeout(() => {
      currentQIndex++;
      if (currentQIndex < 10) loadQuestion();
      else endGame();
    }, 1500);
  }

  async function endGame() {
    switchView('view-result');
    document.getElementById('final-score').innerText = score;
    document.getElementById('final-time').innerText = totalTimeTaken;
    if(score >= 7) fireConfetti();

    // ડેટા સેવ કરો (CORS એરર અટકાવવા text/plain નો ઉપયોગ)
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({ name: userName, score: score, time: totalTimeTaken })
      });
      fetchLeaderboard();
    } catch (e) {
      alert("સ્કોર સેવ કરવામાં ભૂલ થઈ!");
      fetchLeaderboard(); // તો પણ લિડરબોર્ડ બતાવી દઈએ
    }
  }

  async function fetchLeaderboard() {
    document.getElementById('leaderboard-list').innerHTML = '<div class="spinner"></div>';
    try {
      const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard`);
      const data = await response.json();
      renderLeaderboard(data);
    } catch (error) {
      document.getElementById('leaderboard-list').innerHTML = "<p>લિડરબોર્ડ લોડ થઈ શક્યું નથી.</p>";
    }
  }

  function renderLeaderboard(data) {
    document.getElementById('total-participants').innerText = data.total;
    const list = document.getElementById('leaderboard-list');
    
    if(!data || data.leaderboard.length === 0) {
      list.innerHTML = "<p style='padding:20px; color:#6b7280;'>હજુ સુધી કોઈએ ક્વિઝ રમી નથી. પ્રથમ બનો! 🚀</p>";
      return;
    }

    let html = "";
    const medals = ['🥇', '🥈', '🥉'];

    data.leaderboard.forEach((row, i) => {
      let icon = i < 3 ? medals[i] : `<span style='color:#6b7280; font-size:1rem;'>#${i+1}</span>`;
      let bgStyle = i === 0 ? "background:linear-gradient(to right, #fffbeb, #fff);" : "";
      
      html += `
        <div class="lb-item" style="${bgStyle}">
          <div class="lb-rank">${icon}</div>
          <div class="lb-name">${row.name}</div>
          <div class="lb-details">
            <span class="score-pill">${row.score} ગુણ</span>
            <span class="time-pill">⏱ ${row.time}s</span>
          </div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  function resetGame() {
    document.getElementById('username').value = "";
    switchView('view-start');
  }

  // --- CONFETTI ---
  function fireConfetti() {
    const c = document.getElementById('confetti'); const ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    let p = []; for(let i=0; i<150; i++) p.push({x:c.width/2, y:c.height/2, vx:(Math.random()-0.5)*20, vy:(Math.random()-1)*20, c:`hsl(${Math.random()*360},100%,50%)`, life:100});
    function d(){ ctx.clearRect(0,0,c.width,c.height); p.forEach((pt,i)=>{ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.5; pt.life--; ctx.fillStyle=pt.c; ctx.fillRect(pt.x,pt.y,8,8); if(pt.life<=0)p.splice(i,1); }); if(p.length)requestAnimationFrame(d); } d();
  }
</script>

</body>
</html>
